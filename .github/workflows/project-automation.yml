name: Project Automation
on:
  pull_request:
    types: [opened, closed]
  pull_request_review:
    types: [submitted]

env:
  PROJECT_ID: 'PVT_kwHOAtlXXM4BS4y9'
  STATUS_FIELD_ID: 'PVTSSF_lAHOAtlXXM4BS4y9zhASlqs'
  # Status option IDs
  STATUS_CODE_REVIEW: '11098b01'
  STATUS_TESTING: '34855c68'
  STATUS_DONE: '66ee02bf'

jobs:
  update-project:
    if: ${{ secrets.PROJECT_TOKEN != '' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: PR作成時 → 関連Issueを「コードレビュー」へ
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            const issueMatch = body.match(/(?:closes|fixes|resolves)\s+#(\d+)/i);
            if (!issueMatch) {
              console.log('No related issue found in PR body');
              return;
            }
            const issueNumber = parseInt(issueMatch[1]);
            console.log(`Related issue: #${issueNumber}`);

            // Get issue node ID
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            const contentId = issue.data.node_id;

            // Find the item in the project
            const query = `query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      content { ... on Issue { id number } }
                    }
                  }
                }
              }
            }`;
            const result = await github.graphql(query, { projectId: process.env.PROJECT_ID });
            const item = result.node.items.nodes.find(n => n.content?.number === issueNumber);
            if (!item) {
              console.log(`Issue #${issueNumber} not found in project`);
              return;
            }

            // Update status to コードレビュー
            const mutation = `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId, itemId: $itemId, fieldId: $fieldId,
                value: { singleSelectOptionId: $optionId }
              }) { projectV2Item { id } }
            }`;
            await github.graphql(mutation, {
              projectId: process.env.PROJECT_ID,
              itemId: item.id,
              fieldId: process.env.STATUS_FIELD_ID,
              optionId: process.env.STATUS_CODE_REVIEW
            });
            console.log(`Issue #${issueNumber} moved to コードレビュー`);

      - name: レビュー承認時 → 関連Issueを「テスト中」へ
        if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            const issueMatch = body.match(/(?:closes|fixes|resolves)\s+#(\d+)/i);
            if (!issueMatch) return;
            const issueNumber = parseInt(issueMatch[1]);

            const query = `query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes { id content { ... on Issue { id number } } }
                  }
                }
              }
            }`;
            const result = await github.graphql(query, { projectId: process.env.PROJECT_ID });
            const item = result.node.items.nodes.find(n => n.content?.number === issueNumber);
            if (!item) return;

            const mutation = `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId, itemId: $itemId, fieldId: $fieldId,
                value: { singleSelectOptionId: $optionId }
              }) { projectV2Item { id } }
            }`;
            await github.graphql(mutation, {
              projectId: process.env.PROJECT_ID,
              itemId: item.id,
              fieldId: process.env.STATUS_FIELD_ID,
              optionId: process.env.STATUS_TESTING
            });
            console.log(`Issue #${issueNumber} moved to テスト中`);

      - name: PRマージ時 → 関連Issueを「Done」へ
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            const issueMatch = body.match(/(?:closes|fixes|resolves)\s+#(\d+)/i);
            if (!issueMatch) return;
            const issueNumber = parseInt(issueMatch[1]);

            const query = `query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes { id content { ... on Issue { id number } } }
                  }
                }
              }
            }`;
            const result = await github.graphql(query, { projectId: process.env.PROJECT_ID });
            const item = result.node.items.nodes.find(n => n.content?.number === issueNumber);
            if (!item) return;

            const mutation = `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId, itemId: $itemId, fieldId: $fieldId,
                value: { singleSelectOptionId: $optionId }
              }) { projectV2Item { id } }
            }`;
            await github.graphql(mutation, {
              projectId: process.env.PROJECT_ID,
              itemId: item.id,
              fieldId: process.env.STATUS_FIELD_ID,
              optionId: process.env.STATUS_DONE
            });
            console.log(`Issue #${issueNumber} moved to Done`);

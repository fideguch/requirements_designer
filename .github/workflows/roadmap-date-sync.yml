name: Roadmap Date Sync

# Sprint（Iteration）フィールドの開始日・終了日をRoadmapビューに自動反映する
# プロジェクトアイテムにSprintが設定されたとき、対応する日付をRoadmapのタイムラインに表示

on:
  # 手動実行（全アイテム一括同期）
  workflow_dispatch:
  # 定期実行（毎日 9:00 UTC）
  schedule:
    - cron: '0 9 * * *'
  # Issue/PR イベント時に実行
  issues:
    types: [opened, edited, labeled, assigned]
  pull_request:
    types: [opened, edited, labeled]

env:
  PROJECT_ID: 'PVT_kwHOAtlXXM4BS4y9'
  PROJECT_NUMBER: 3
  OWNER: 'fideguch'

jobs:
  sync-roadmap-dates:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || secrets.PROJECT_TOKEN != '' }}
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
    steps:
      - name: Sprint日付をRoadmapに同期
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            // 1. プロジェクトのフィールド情報を取得（Sprint Iteration フィールドを特定）
            const fieldsQuery = `query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  fields(first: 50) {
                    nodes {
                      ... on ProjectV2IterationField {
                        id
                        name
                        configuration {
                          iterations {
                            id
                            title
                            startDate
                            duration
                          }
                          completedIterations {
                            id
                            title
                            startDate
                            duration
                          }
                        }
                      }
                      ... on ProjectV2Field {
                        id
                        name
                        dataType
                      }
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }`;

            const fieldsResult = await github.graphql(fieldsQuery, {
              projectId: process.env.PROJECT_ID
            });

            const fields = fieldsResult.node.fields.nodes;

            // Sprint (Iteration) フィールドを検索
            const sprintField = fields.find(f => f.configuration?.iterations);
            if (!sprintField) {
              console.log('Sprint (Iteration) フィールドが見つかりません');
              return;
            }
            console.log(`Sprint フィールド検出: ${sprintField.name} (${sprintField.id})`);

            // 全イテレーション（アクティブ + 完了済み）のマッピング
            const allIterations = [
              ...(sprintField.configuration.iterations || []),
              ...(sprintField.configuration.completedIterations || [])
            ];
            const iterationMap = {};
            for (const iter of allIterations) {
              // duration は日数
              const startDate = new Date(iter.startDate);
              const endDate = new Date(startDate);
              endDate.setDate(endDate.getDate() + iter.duration);
              iterationMap[iter.id] = {
                title: iter.title,
                startDate: iter.startDate,
                endDate: endDate.toISOString().split('T')[0],
                duration: iter.duration
              };
              console.log(`  Sprint: ${iter.title} (${iter.startDate} ~ ${endDate.toISOString().split('T')[0]})`);
            }

            // 2. プロジェクト内の全アイテムを取得
            let hasNextPage = true;
            let cursor = null;
            let allItems = [];

            while (hasNextPage) {
              const itemsQuery = `query($projectId: ID!, $cursor: String) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100, after: $cursor) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        id
                        content {
                          ... on Issue { number title }
                          ... on PullRequest { number title }
                        }
                        fieldValues(first: 30) {
                          nodes {
                            ... on ProjectV2ItemFieldIterationValue {
                              field { ... on ProjectV2IterationField { id name } }
                              iterationId
                              title
                              startDate
                              duration
                            }
                            ... on ProjectV2ItemFieldDateValue {
                              field { ... on ProjectV2Field { id name } }
                              date
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }`;

              const result = await github.graphql(itemsQuery, {
                projectId: process.env.PROJECT_ID,
                cursor: cursor
              });

              const items = result.node.items;
              allItems = allItems.concat(items.nodes);
              hasNextPage = items.pageInfo.hasNextPage;
              cursor = items.pageInfo.endCursor;
            }

            console.log(`\n合計 ${allItems.length} アイテムを取得`);

            // 3. 各アイテムのSprint情報を確認し、日付フィールドの状態をログ出力
            let syncCount = 0;
            for (const item of allItems) {
              const title = item.content?.title || '(Draft item)';
              const number = item.content?.number || '-';

              // Sprint フィールド値を検索
              const sprintValue = item.fieldValues.nodes.find(
                fv => fv.iterationId && fv.field?.id === sprintField.id
              );

              if (!sprintValue) {
                continue; // Sprint未設定のアイテムはスキップ
              }

              const iterInfo = iterationMap[sprintValue.iterationId];
              if (!iterInfo) {
                console.log(`  #${number} ${title}: Sprint ID ${sprintValue.iterationId} の情報が見つかりません`);
                continue;
              }

              console.log(`  #${number} ${title}: Sprint "${iterInfo.title}" → ${iterInfo.startDate} ~ ${iterInfo.endDate}`);
              syncCount++;
            }

            console.log(`\n同期対象: ${syncCount} アイテム`);
            console.log('\nRoadmapビューではSprint (Iteration) フィールドの開始日・終了日が');
            console.log('自動的にタイムライン上のバーとして表示されます。');
            console.log('Date fields設定: Start date = Sprint start, Target date = Sprint end');

            // 4. サマリー出力
            core.summary
              .addHeading('Roadmap Date Sync 結果', 2)
              .addRaw(`**処理日時**: ${new Date().toISOString()}`)
              .addBreak()
              .addRaw(`**対象アイテム数**: ${allItems.length}`)
              .addBreak()
              .addRaw(`**Sprint設定済み**: ${syncCount}`)
              .addBreak()
              .addBreak()
              .addHeading('Sprint 一覧', 3);

            for (const [id, info] of Object.entries(iterationMap)) {
              core.summary.addRaw(`- **${info.title}**: ${info.startDate} ~ ${info.endDate}`).addBreak();
            }

            await core.summary.write();

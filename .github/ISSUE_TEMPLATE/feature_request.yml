name: '機能要望 (Feature Request)'
description: '新機能の提案'
labels: ['feature']
body:
  - type: markdown
    attributes:
      value: '## 機能要望'
  - type: textarea
    id: summary
    attributes:
      label: '概要'
      description: '実現したいことを簡潔に記述してください'
      placeholder: '新しいフェーズを追加して○○できるようにしたい'
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: '背景・課題'
      description: 'なぜこの機能が必要なのか、現在の課題を説明してください'
      placeholder: '現状は○○のため、△△の問題がある'
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: '提案する解決策'
      description: 'どのように解決したいか具体的に記述してください'
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: '優先度'
      options:
        - High
        - Medium
        - Low
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: '受け入れ基準'
      description: 'この機能が完成したと判断する条件'
      placeholder: |
        - [ ] ○○ができること
        - [ ] テストが追加されていること
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: '補足情報'
      description: '参考 URL、関連 Issue など'
    validations:
      required: false

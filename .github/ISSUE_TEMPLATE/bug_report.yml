name: 'バグ報告 (Bug Report)'
description: 'バグの報告'
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: '## バグ報告'
  - type: textarea
    id: summary
    attributes:
      label: 'バグの概要'
      description: '発生している問題を簡潔に記述してください'
      placeholder: 'Phase 2 で○○すると、△△が発生する'
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: '再現手順'
      description: 'バグを再現するための手順'
      placeholder: |
        1. /requirements_designer を起動
        2. 「○○の要件定義をしたい」と入力
        3. Phase 2 で△△と回答
        4. エラーが発生
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: '期待される動作'
      description: '本来どうなるべきか'
      placeholder: 'FR-001 が正しく生成される'
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: '実際の動作'
      description: '現在何が起きているか'
      placeholder: 'エラーが表示される / 不正なフォーマットで出力される'
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: '深刻度'
      options:
        - High - スキルが実行不能 / データ消失
        - Medium - 特定フェーズが正常動作しない
        - Low - 軽微な表示崩れ / 誤字
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: '環境情報'
      description: 'Node.js バージョン、OS、Claude Code バージョンなど'
      placeholder: |
        - OS: macOS 15.x
        - Node.js: v20.x
        - Claude Code: vX.X.X
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 'エラーログ・実行結果'
      description: 'エラーメッセージやスタックトレースがあれば貼り付け'
      render: shell
    validations:
      required: false

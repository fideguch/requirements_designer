frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/components/**'
          - 'src/pages/**'
          - 'src/styles/**'
          - '*.css'
          - '*.scss'
          - '*.tsx'

backend:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/api/**'
          - 'src/server/**'
          - 'src/lib/**'
          - 'src/db/**'

infra:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - 'Dockerfile'
          - 'docker-compose.*'
          - '*.yml'
          - '*.yaml'

docs:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**'

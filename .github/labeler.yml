skill:
  - changed-files:
      - any-glob-to-any-file:
          - 'SKILL.md'

templates:
  - changed-files:
      - any-glob-to-any-file:
          - 'templates/**'

references:
  - changed-files:
      - any-glob-to-any-file:
          - 'references/**'

test:
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'
          - 'playwright.config.ts'

docs:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - '!SKILL.md'

infra:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - 'package.json'
          - 'tsconfig.json'
          - 'eslint.config.mjs'
          - '.prettierrc'
